<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eridian Translator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "IBM Plex Mono", monospace;
      background: #0a0a0c;
      color: #40e8c8;
      height: 100vh;
      overflow: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        transparent 0px, transparent 1px,
        rgba(0,0,0,0.06) 1px, rgba(0,0,0,0.06) 2px
      );
      pointer-events: none;
      z-index: 100;
    }

    .layout {
      display: flex;
      height: 100vh;
      gap: 0;
    }

    /* ---- LEFT: Waveform panel ---- */
    .wave-side {
      flex: 6;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1a2a28;
      background: #060a09;
    }

    /* ---- RIGHT: Text panel (40%) ---- */
    .text-side {
      flex: 4;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: #080c0b;
    }

    .text-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #0e1a18;
      flex-shrink: 0;
    }

    .text-header .title {
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #2a7a68;
    }

    .text-header .count {
      font-size: 0.45rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #1a3a34;
    }

    .log-feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .log-feed::-webkit-scrollbar { width: 3px; }
    .log-feed::-webkit-scrollbar-track { background: #080c0b; }
    .log-feed::-webkit-scrollbar-thumb { background: #1a2a28; }

    .log-entry {
      font-size: 0.72rem;
      line-height: 1.5;
      padding: 6px 8px;
      border-left: 2px solid #0e1a18;
      color: #2a6a58;
      transition: all 0.3s;
      word-wrap: break-word;
    }

    .log-entry.pending { border-left-color: #e8a840; color: #a08030; }
    .log-entry.speaking { border-left-color: #40e8c8; color: #50f0d0; background: rgba(64,232,200,0.03); }
    .log-entry.done { border-left-color: #1a3a34; color: #2a6a58; }
    .log-entry.error { border-left-color: #c04040; color: #c04040; }

    .log-entry .ts {
      font-size: 0.45rem;
      color: #143028;
      margin-right: 5px;
    }

    .log-entry .tag {
      font-size: 0.4rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1px 4px;
      border: 1px solid;
      margin-right: 5px;
      vertical-align: middle;
    }

    .log-entry.pending .tag { border-color: #a08030; color: #e8a840; }
    .log-entry.speaking .tag { border-color: #30a088; color: #40e8c8; }
    .log-entry.done .tag { border-color: #1a3a34; color: #2a5a4a; }
    .log-entry.error .tag { border-color: #802020; color: #c04040; }

    .log-empty {
      text-align: center;
      color: #122420;
      font-size: 0.65rem;
      padding: 2rem 0;
      letter-spacing: 0.06em;
    }

    .text-footer {
      padding: 6px 14px;
      border-top: 1px solid #0e1a18;
      font-size: 0.4rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #122420;
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* (wave-side defined above with flex: 6) */

    .wave-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #0e1a18;
      flex-shrink: 0;
    }

    .wave-header .label {
      font-size: 0.45rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #1a3a34;
    }

    .wave-header .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #1a4a40;
    }

    .wave-header .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1a2a28;
      transition: all 0.3s;
    }

    .wave-header .status.connected .dot { background: #30c8a0; box-shadow: 0 0 6px #30c8a0; }
    .wave-header .status.disconnected .dot { background: #c04040; }
    .wave-header .status.speaking .dot { background: #40e8c8; box-shadow: 0 0 10px #40e8c8; animation: pulse 0.5s infinite; }
    .wave-header .status.generating .dot { background: #e8a840; box-shadow: 0 0 8px #e8a840; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .canvas-wrap {
      flex: 1;
      display: flex;
      flex-direction: row;
      padding: 10px;
      gap: 6px;
      min-height: 0;
      overflow: hidden;
    }

    .canvas-box {
      flex: 1;
      position: relative;
      min-width: 0;
      min-height: 0;
    }

    .canvas-box canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .canvas-label {
      position: absolute;
      top: 6px; left: 10px;
      font-size: 0.4rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #1a3a34;
      z-index: 2;
    }

    /* Theme picker */
    .theme-picker {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .theme-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      opacity: 0.5;
    }

    .theme-dot:hover { opacity: 0.8; transform: scale(1.2); }
    .theme-dot.active { border-color: #fff; opacity: 1; }

    /* Boot screen */
    #startScreen {
      position: fixed;
      inset: 0;
      background: #0a0a0c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    #startScreen .boot-title {
      font-size: 0.55rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #1a3a34;
      margin-bottom: 2rem;
    }

    #startScreen button {
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 14px 36px;
      border: 1px solid #30a088;
      background: transparent;
      color: #40e8c8;
      cursor: pointer;
      transition: all 0.2s;
    }

    #startScreen button:hover {
      background: rgba(64,232,200,0.06);
      box-shadow: 0 0 24px rgba(64,232,200,0.08);
    }

    #startScreen .boot-sub {
      font-size: 0.5rem;
      color: #122420;
      margin-top: 1.2rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div id="startScreen">
    <div class="boot-title">Eridian Translator v2.1</div>
    <button onclick="start()">Initialize</button>
    <div class="boot-sub">audio output required</div>
  </div>

  <div class="layout" id="mainFrame" style="display:none;">

    <!-- LEFT: Waveform (60%) -->
    <div class="wave-side">
      <div class="wave-header">
        <span class="label">Waveform Analysis</span>
        <div class="theme-picker" id="themePicker"></div>
        <div class="status disconnected" id="statusBar">
          <span class="dot"></span>
          <span id="statusText">offline</span>
        </div>
      </div>
      <div class="canvas-wrap">
        <div class="canvas-box">
          <div class="canvas-label">Time Domain</div>
          <canvas id="waveCanvas"></canvas>
        </div>
        <div class="canvas-box">
          <div class="canvas-label">Frequency Spectrum</div>
          <canvas id="specCanvas"></canvas>
        </div>
      </div>
    </div>

    <!-- RIGHT: Translation text (40%) -->
    <div class="text-side">
      <div class="text-header">
        <span class="title">Translation Log</span>
        <span class="count" id="msgCount">0</span>
      </div>
      <div class="log-feed" id="feed">
        <div class="log-empty" id="empty">awaiting signal...</div>
      </div>
      <div class="text-footer">
        <span>PCM <span id="infoRate">48000</span>Hz</span>
        <span id="infoVoice">voice: pending</span>
      </div>
    </div>

  </div>

  <script>
    // ---- Themes ----
    const THEMES = {
      rainbow:  { label: "Rainbow",  hue: -1,  dot: "linear-gradient(135deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f)" },
      cyan:     { label: "Cyan",     hue: 175, dot: "#40e8c8" },
      amber:    { label: "Amber",    hue: 38,  dot: "#e8a840" },
      green:    { label: "Green",    hue: 120, dot: "#40e860" },
      purple:   { label: "Purple",   hue: 270, dot: "#a040e8" },
      red:      { label: "Red",      hue: 0,   dot: "#e84040" },
    };
    let currentTheme = localStorage.getItem("rocky-theme") || "rainbow";

    function initThemePicker() {
      const picker = document.getElementById("themePicker");
      for (const [key, theme] of Object.entries(THEMES)) {
        const dot = document.createElement("div");
        dot.className = "theme-dot" + (key === currentTheme ? " active" : "");
        dot.style.background = theme.dot;
        dot.title = theme.label;
        dot.dataset.theme = key;
        dot.onclick = () => setTheme(key);
        picker.appendChild(dot);
      }
    }

    function setTheme(name) {
      currentTheme = name;
      localStorage.setItem("rocky-theme", name);
      document.querySelectorAll(".theme-dot").forEach(d => {
        d.classList.toggle("active", d.dataset.theme === name);
      });
    }

    let audioCtx, analyser, waveData, freqData;
    let waveCanvas, waveCtx, specCanvas, specCtx;
    let vizRunning = false;
    let activeSpeakers = 0;
    let pendingCount = 0;
    let frameCount = 0;

    const messageEls = new Map();
    const playState = new Map();
    let sampleRate = 48000;
    let channels = 1;
    let totalMessages = 0;

    function start() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();

      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.82;
      analyser.connect(audioCtx.destination);
      waveData = new Uint8Array(analyser.fftSize);
      freqData = new Uint8Array(analyser.frequencyBinCount);

      waveCanvas = document.getElementById("waveCanvas");
      waveCtx = waveCanvas.getContext("2d");
      specCanvas = document.getElementById("specCanvas");
      specCtx = specCanvas.getContext("2d");

      initThemePicker();
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("mainFrame").style.display = "flex";

      // Wait for layout to settle, then size canvases
      requestAnimationFrame(() => {
        resizeAll();
        vizRunning = true;
        draw();
      });

      // Re-size whenever container changes
      const ro = new ResizeObserver(() => resizeAll());
      ro.observe(waveCanvas.parentElement);
      ro.observe(specCanvas.parentElement);

      connect();
    }

    function resizeAll() {
      const dpr = window.devicePixelRatio || 1;
      [waveCanvas, specCanvas].forEach(c => {
        if (!c || !c.parentElement) return;
        const rect = c.parentElement.getBoundingClientRect();
        if (rect.width < 1 || rect.height < 1) return;
        c.width = rect.width * dpr;
        c.height = rect.height * dpr;
      });
    }

    function draw() {
      if (!vizRunning) return;
      requestAnimationFrame(draw);
      frameCount++;
      drawWaveform();
      drawSpectrum();
    }

    function rainbow(pos) {
      const t = THEMES[currentTheme];
      if (!t || t.hue === -1) {
        const hue = (pos * 300) % 360;
        return `hsl(${hue}, 100%, 55%)`;
      }
      const hue = (t.hue + pos * 40 - 20) % 360;
      return `hsl(${hue}, 100%, 55%)`;
    }

    function rainbowAlpha(pos, a) {
      const t = THEMES[currentTheme];
      if (!t || t.hue === -1) {
        const hue = (pos * 300) % 360;
        return `hsla(${hue}, 100%, 55%, ${a})`;
      }
      const hue = (t.hue + pos * 40 - 20) % 360;
      return `hsla(${hue}, 100%, 55%, ${a})`;
    }

    function drawGrid(ctx, w, h, vertical) {
      ctx.strokeStyle = "rgba(30, 60, 52, 0.15)";
      ctx.lineWidth = 0.5;
      if (vertical) {
        for (let i = 1; i < 12; i++) {
          const y = (h / 12) * i;
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        }
        for (let i = 1; i < 6; i++) {
          const x = (w / 6) * i;
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
        }
        ctx.strokeStyle = "rgba(30, 60, 52, 0.3)";
        ctx.beginPath(); ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h); ctx.stroke();
      } else {
        for (let i = 1; i < 8; i++) {
          const y = (h / 8) * i;
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        }
        for (let i = 1; i < 16; i++) {
          const x = (w / 16) * i;
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
        }
      }
    }

    // Oscilloscope: vertical. Waveform deflects left/right. Rainbow gradient.
    function drawWaveform() {
      const w = waveCanvas.width, h = waveCanvas.height;
      waveCtx.fillStyle = "#060a09";
      waveCtx.fillRect(0, 0, w, h);
      drawGrid(waveCtx, w, h, true);

      analyser.getByteTimeDomainData(waveData);
      const active = activeSpeakers > 0;
      const generating = pendingCount > 0 && !active;

      // Build 200 points (not per-pixel, keeps it fast and visible)
      const numPts = 200;
      const points = [];
      for (let p = 0; p < numPts; p++) {
        const yPos = (p / numPts) * h;
        const i = Math.floor((p / numPts) * waveData.length);
        let v;
        if (active) {
          v = (waveData[i] / 128.0) - 1.0;
        } else if (generating) {
          const t = frameCount * 0.03;
          v = Math.sin(t + p * 0.06) * 0.22
            + Math.sin(t * 1.6 + p * 0.15) * 0.12
            + Math.sin(t * 2.3 + p * 0.25) * 0.06;
        } else {
          const t = frameCount * 0.012;
          v = Math.sin(t + p * 0.04) * 0.08
            + Math.sin(t * 0.7 + p * 0.09) * 0.05
            + Math.sin(t * 1.3 + p * 0.02) * 0.03;
        }
        points.push({ x: (w / 2) + v * (w * 0.42), y: yPos });
      }

      // Draw rainbow segments in chunks of ~5 points for smooth color bands
      const chunkSize = 3;
      const lineW = active ? 3 : generating ? 2.5 : 1.5;

      for (let c = 0; c < numPts - 1; c += chunkSize) {
        const end = Math.min(c + chunkSize + 1, numPts);
        const pos = c / numPts;
        const intensity = active ? 1.0 : generating ? 0.7 : 0.35;

        // Ghost glow
        waveCtx.strokeStyle = rainbowAlpha(pos, active ? 0.12 : generating ? 0.1 : 0.06);
        waveCtx.lineWidth = lineW + (active ? 10 : generating ? 8 : 6);
        waveCtx.beginPath();
        waveCtx.moveTo(points[c].x, points[c].y);
        for (let j = c + 1; j < end; j++) waveCtx.lineTo(points[j].x, points[j].y);
        waveCtx.stroke();

        // Main line
        waveCtx.strokeStyle = rainbowAlpha(pos, intensity);
        waveCtx.shadowColor = rainbow(pos);
        waveCtx.shadowBlur = active ? 16 : generating ? 8 : 4;
        waveCtx.lineWidth = lineW;
        waveCtx.beginPath();
        waveCtx.moveTo(points[c].x, points[c].y);
        for (let j = c + 1; j < end; j++) waveCtx.lineTo(points[j].x, points[j].y);
        waveCtx.stroke();
      }
      waveCtx.shadowBlur = 0;
    }

    // Spectrograph: vertical. 64 thick bars. Rainbow colored by frequency.
    function drawSpectrum() {
      const w = specCanvas.width, h = specCanvas.height;
      specCtx.fillStyle = "#060a09";
      specCtx.fillRect(0, 0, w, h);
      drawGrid(specCtx, w, h, true);

      analyser.getByteFrequencyData(freqData);
      const active = activeSpeakers > 0;
      const generating = pendingCount > 0 && !active;

      // Group 1024 bins into 64 visible bars
      const numBars = 64;
      const binsPerBar = Math.floor(freqData.length / numBars);
      const barH = h / numBars;
      const gap = 2;

      for (let b = 0; b < numBars; b++) {
        let sum = 0;
        const start = b * binsPerBar;
        for (let j = start; j < start + binsPerBar; j++) sum += freqData[j];
        let val;
        if (active) {
          val = (sum / binsPerBar) / 255;
        } else if (generating) {
          const t = frameCount * 0.025;
          val = (Math.sin(t + b * 0.18) * 0.5 + 0.5)
              * (Math.cos(t * 0.6 + b * 0.09) * 0.3 + 0.4) * 0.35;
        } else {
          const t = frameCount * 0.015;
          val = (Math.sin(t + b * 0.12) * 0.5 + 0.5)
              * (Math.cos(t * 0.5 + b * 0.06) * 0.3 + 0.35) * 0.18;
        }

        if (val < 0.005) continue;

        const pos = b / numBars;
        const barW = val * w * 0.88;
        const y = b * barH;
        const intensity = active ? 0.4 + val * 0.6 : 0.2 + val * 0.4;

        // Glow behind bar
        specCtx.shadowColor = rainbow(pos);
        specCtx.shadowBlur = active ? 10 : 4;

        // Filled bar
        specCtx.fillStyle = rainbowAlpha(pos, intensity * 0.5);
        specCtx.fillRect(0, y + gap / 2, barW, barH - gap);

        // Bright tip
        specCtx.fillStyle = rainbowAlpha(pos, intensity);
        specCtx.fillRect(barW - 4, y + gap / 2, 5, barH - gap);

        specCtx.shadowBlur = 0;
      }
    }

    // ---- Connection ----

    function connect() {
      const es = new EventSource("/api/events");
      es.onopen = () => { setStatus("connected", "listening"); };
      es.onerror = () => { setStatus("disconnected", "reconnecting"); };
      es.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if (d.type === "connected") {
          if (d.sampleRate) { sampleRate = d.sampleRate; document.getElementById("infoRate").textContent = sampleRate; }
          if (d.channels) channels = d.channels;
          document.getElementById("infoVoice").textContent = "voice: ready";
          return;
        }
        if (d.type === "pending") addMessage(d.msgId, d.text);
        if (d.type === "chunk") handleChunk(d.msgId, d.audio);
        if (d.type === "done") handleDone(d.msgId);
        if (d.type === "error") markError(d.msgId, d.error);
      };
    }

    function setStatus(cls, text) {
      document.getElementById("statusBar").className = "status " + cls;
      document.getElementById("statusText").textContent = text;
    }

    function updateStatus() {
      if (activeSpeakers > 0) setStatus("speaking", "translating");
      else if (pendingCount > 0) setStatus("generating", "generating");
      else setStatus("connected", "listening");
    }

    // ---- Messages ----

    function ts() { return new Date().toTimeString().slice(0, 8); }

    function addMessage(msgId, text) {
      document.getElementById("empty").style.display = "none";
      totalMessages++;
      pendingCount++;
      document.getElementById("msgCount").textContent = totalMessages;
      updateStatus();

      const feed = document.getElementById("feed");
      const el = document.createElement("div");
      el.className = "log-entry pending";
      el.innerHTML = `<span class="ts">${ts()}</span><span class="tag">gen</span>${escapeHtml(text)}`;
      feed.appendChild(el);
      feed.scrollTop = feed.scrollHeight;
      messageEls.set(msgId, el);
      playState.set(msgId, {
        nextTime: 0, endTime: 0,
        leftover: new Uint8Array(0),
        gotAudio: false, lastSource: null,
      });
    }

    function setEntry(msgId, state) {
      const el = messageEls.get(msgId);
      if (!el) return;
      el.className = "log-entry " + state;
      const tag = el.querySelector(".tag");
      if (tag) tag.textContent = { pending:"gen", speaking:"live", done:"done", error:"err" }[state] || state;
    }

    function handleChunk(msgId, b64) {
      const st = playState.get(msgId);
      if (!st || !audioCtx) return;

      if (!st.gotAudio) {
        pendingCount = Math.max(0, pendingCount - 1);
        activeSpeakers++;
        setEntry(msgId, "speaking");
        updateStatus();
      }
      st.gotAudio = true;

      const bin = atob(b64);
      let bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

      if (st.leftover.length) {
        const merged = new Uint8Array(st.leftover.length + bytes.length);
        merged.set(st.leftover, 0);
        merged.set(bytes, st.leftover.length);
        bytes = merged;
      }

      const usableLen = bytes.length - (bytes.length % 2);
      st.leftover = bytes.slice(usableLen);
      if (usableLen === 0) return;

      const numSamples = usableLen / 2;
      const view = new DataView(bytes.buffer, bytes.byteOffset, usableLen);
      const audioBuffer = audioCtx.createBuffer(channels, numSamples, sampleRate);
      const ch = audioBuffer.getChannelData(0);
      for (let i = 0; i < numSamples; i++) ch[i] = view.getInt16(i * 2, true) / 32768;

      const src = audioCtx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(analyser);

      const now = audioCtx.currentTime;
      if (st.nextTime < now) st.nextTime = now;
      src.start(st.nextTime);
      st.nextTime += audioBuffer.duration;
      st.endTime = st.nextTime;
      st.lastSource = src;
    }

    function handleDone(msgId) {
      const st = playState.get(msgId);
      const finish = () => {
        setEntry(msgId, "done");
        if (st && st.gotAudio) activeSpeakers = Math.max(0, activeSpeakers - 1);
        else pendingCount = Math.max(0, pendingCount - 1);
        updateStatus();
        playState.delete(msgId);
      };
      if (!st || !st.gotAudio) { finish(); return; }
      if (audioCtx.currentTime >= st.endTime - 0.02 || !st.lastSource) finish();
      else st.lastSource.onended = finish;
    }

    function markError(msgId) {
      const el = messageEls.get(msgId);
      if (el) { el.className = "log-entry error"; const t = el.querySelector(".tag"); if (t) t.textContent = "err"; }
      const st = playState.get(msgId);
      if (st) { if (st.gotAudio) activeSpeakers = Math.max(0, activeSpeakers - 1); else pendingCount = Math.max(0, pendingCount - 1); }
      updateStatus();
      playState.delete(msgId);
    }

    function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
  </script>
</body>
</html>
